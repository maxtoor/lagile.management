services:
  db:
    image: postgres:16
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agile_work}
      POSTGRES_USER: ${POSTGRES_USER:-agile}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agile}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agile} -d ${POSTGRES_DB:-agile_work}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - .env
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py createsuperuser --noinput || true &&
             python manage.py runserver 0.0.0.0:8000"

  scheduler:
    build: .
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - .env
    environment:
      AGILE_LOG_FILE: /app/logs/scheduler.log
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_started
    volumes:
      - .:/app
    command: >
      sh -c "mkdir -p /app/logs;
             exec >> /app/logs/scheduler.log 2>&1;
             echo '[scheduler] started';
             while true; do
               python manage.py send_submission_reminders || true;
               python manage.py send_manager_monthly_summary || true;
               python manage.py prepare_next_year_holidays || true;
               sleep ${REMINDER_CHECK_INTERVAL_SECONDS:-3600};
             done"

volumes:
  pg_data:
